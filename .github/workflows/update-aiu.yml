name: Update Advanced Installer AIU

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "VersĂ£o sem v. Ex: 2.0.80"
        required: true

jobs:
  update-aiu:
    runs-on: ubuntu-latest

    steps:
      - name: Define release data
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="jandisonsantos/cargo-simuladores-downloads"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            TAG="v$VERSION"
          else
            TAG="${{ github.event.release.tag_name }}"
            VERSION="${TAG#v}"
          fi

          FILE_NAME="cargo_simuladores_central_controles_${VERSION}.exe"

          RELEASE_JSON=$(gh release view "$TAG" --repo "$REPO" --json assets,body)

          echo "Procurando asset: $FILE_NAME"
          echo "Assets disponĂ­veis:"
          echo "$RELEASE_JSON" | jq -r '.assets[].name'

          ASSET_URL=$(echo "$RELEASE_JSON" | jq -r --arg FILE "$FILE_NAME" '.assets[] | select(.name == $FILE) | (.url // .browser_download_url)')
          ASSET_SIZE=$(echo "$RELEASE_JSON" | jq -r --arg FILE "$FILE_NAME" '.assets[] | select(.name == $FILE) | .size')

          if [ -z "$ASSET_URL" ] || [ "$ASSET_URL" = "null" ]; then
            echo "Asset encontrado pelo nome, mas URL nĂ£o encontrada para: $FILE_NAME"
            echo "JSON do asset:"
            echo "$RELEASE_JSON" | jq -r --arg FILE "$FILE_NAME" '.assets[] | select(.name == $FILE)'
            exit 1
          fi

          DESCRIPTION=$(echo "$RELEASE_JSON" | jq -r '.body // "Atualizacao da Central de Controles"')
          DESCRIPTION=$(echo "$DESCRIPTION" | tr '\r\n' ' ' | sed 's/[=;]/-/g' | sed 's/  */ /g' | xargs)

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "file_name=$FILE_NAME" >> $GITHUB_OUTPUT
          echo "asset_url=$ASSET_URL" >> $GITHUB_OUTPUT
          echo "asset_size=$ASSET_SIZE" >> $GITHUB_OUTPUT
          echo "description=$DESCRIPTION" >> $GITHUB_OUTPUT

      - name: Checkout device-configs
        uses: actions/checkout@v4
        with:
          repository: jandisonsantos/device-configs
          token: ${{ secrets.DEVICE_CONFIGS_TOKEN }}
          ref: main
          path: device-configs

      - name: Generate updates.txt
        run: |
          cat > device-configs/updates.txt <<EOF
          ;aiu;

          [Update1]
          Name=Central de controles ${{ steps.release.outputs.version }}
          Description=${{ steps.release.outputs.description }}
          URL=${{ steps.release.outputs.asset_url }}
          Size=${{ steps.release.outputs.asset_size }}
          ServerFileName=${{ steps.release.outputs.file_name }}
          FilePath=[APPDIR]ChaveDeSetaETS2.exe
          Version=${{ steps.release.outputs.version }}
          Replaces=All
          EOF

          sed -i 's/^[ \t]*//' device-configs/updates.txt

      - name: Commit updates.txt
        run: |
          cd device-configs
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add updates.txt

          if git diff --cached --quiet; then
            echo "Sem alteraĂ§Ăµes no updates.txt"
            exit 0
          fi

          git commit -m "chore: update AIU to ${{ steps.release.outputs.version }}"
          git push
